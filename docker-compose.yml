version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: cogniwatch-postgres
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: cogniwatch-backend
    env_file:
      - .env.example
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
    working_dir: /workspace/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  caregiver-web:
    build:
      context: .
      dockerfile: apps/caregiver-web/Dockerfile
    container_name: cogniwatch-web
    depends_on:
      - backend
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace
    working_dir: /workspace/apps/caregiver-web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
